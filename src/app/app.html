<div class="app-wrapper">

  <header class="app-header">
    <div class="header-left">
      <button class="hamburger" (click)="toggleSidebar()" aria-label="Abrir menú">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <span class="material-symbols-outlined header-logo-icon">terminal</span>
      <span class="header-brand">DevConnect</span>
      <div class="header-search">
        <span class="material-symbols-outlined search-icon">search</span>
        <input
          type="text"
          placeholder="Buscar..."
          class="search-input"
          [value]="searchTerm"
          (input)="onSearch($event)"
        />
      </div>
    </div>
    <div class="header-right">
      <button class="dark-toggle" (click)="toggleDark()" [attr.aria-label]="isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
        <span class="material-symbols-outlined">{{ isDark ? 'light_mode' : 'dark_mode' }}</span>
      </button>
    </div>
  </header>

  <div class="app-body">
    @if (sidebarOpen) {
      <div class="sidebar-overlay" (click)="closeSidebar()"></div>
    }

    <aside class="app-sidebar" [class.open]="sidebarOpen">
      <div class="sidebar-portal">
        <div class="portal-icon-wrap">
          <span class="material-symbols-outlined">terminal</span>
        </div>
        <div class="portal-text">
          <div class="portal-name">Portal del Desarrollador</div>
          <div class="portal-subtitle">HUB EMPRESARIAL</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a routerLink="/usuarios" routerLinkActive="active" class="nav-link" (click)="closeSidebar()">
          <span class="material-symbols-outlined">group</span>
          <span class="nav-label">Usuarios</span>
        </a>
        <a routerLink="/repositorios" routerLinkActive="active" class="nav-link" (click)="closeSidebar()">
          <span class="material-symbols-outlined">folder_code</span>
          <span class="nav-label">Repositorios</span>
        </a>
      </nav>
    </aside>

    <main class="app-main">
      <router-outlet />
    </main>
  </div>

  <footer class="app-footer">
    <p>Universidad de los Andes &bull; MISO &bull; Parcial 1 &bull; Software WEB &bull; Diego Buitrago</p>
  </footer>

</div>
